name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the form as completely as possible.

  - type: input
    id: version
    attributes:
      label: Integration version
      description: Found on the integration page in Home Assistant
      placeholder: "e.g., 1.2.0"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g., 2024.6.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is going wrong? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: Enable debug logging via Settings → System → Logs
      render: text

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Download via the integration page → device → Download Diagnostics
      render: json